name: Build/Release Mango Launcher

on:
  push:
    tags:
      - 'v*' # Se activa cuando creas un tag como v1.0.1

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub lo genera solo
        run: npm run build -- --publish always